#!/bin/bash
# Общий конфиг регламентных скриптов 1С + PostgreSQL.
# Заполнить реальными значениями перед первым запуском (см. пометки "ЗАПОЛНИТЬ").

BASE_DIR=/opt/1c-maintenance
LOG_DIR="$BASE_DIR/logs"

# ---------- Бэкапы ----------
BACKUP_DIR=/backup/1c
BACKUP_RETENTION_DAYS=7
# Минимальный процент свободного места в BACKUP_DIR, при котором бэкап ещё стартует
BACKUP_MIN_FREE_PERCENT=15

# ---------- PostgreSQL ----------
PG_HOST=localhost
PG_PORT=5432
# Роль для бэкапов/обслуживания. Рекомендуется отдельная роль с правами на CONNECT/SELECT
# и REPLICATION (для pg_dump), а не суперпользователь postgres напрямую.
PG_SUPERUSER=postgres
# Если аутентификация по паролю (не peer/trust) — указать путь к .pgpass (формат см. `man pgpass`)
# и раскомментировать. Файл должен иметь права 600.
# PGPASSFILE="$BASE_DIR/etc/.pgpass"

# ---------- Информационные базы 1С <-> базы PostgreSQL ----------
# ЗАПОЛНИТЬ: ключ — имя ИБ в кластере 1С, значение — имя базы данных в PostgreSQL.
declare -A INFOBASES=(
    ["accounting"]="db_buh"
    ["zup"]="db_zup"
)

# ---------- Кластер серверов 1С (rac/ras) ----------
# ЗАПОЛНИТЬ: путь к rac конкретной версии платформы.
RAC_BIN=/opt/1C/v8.3/x86_64/rac
RAS_HOST=localhost
RAS_PORT=1545
# Порог "тяжёлого" рабочего процесса по памяти, КБ (по умолчанию 4 ГБ)
RAC_PROCESS_MEM_LIMIT_KB=4000000

# ---------- Технологический журнал ----------
# Каталог, указанный в logcfg.xml как location.
TJ_LOG_DIR=/var/log/1C/logcfg
TJ_RETENTION_DAYS=7
# Порог долгого запроса к БД, мс (используется как справка — реальное значение задаётся
# в logcfg.xml в микросекундах, см. tj_setup/logcfg.xml)
TJ_SLOW_QUERY_MS=2000

# ---------- Уведомления ----------
NOTIFY_ENABLED=false
